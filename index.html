<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>medxMap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="map" aria-label="Map showing nearby clinics"></div>

    <header class="top-panel" role="banner">
      <div class="brand">
        <span class="brand-dot" aria-hidden="true"></span>
        <h1>medxMap</h1>
      </div>
      <p class="tagline">Find nearby clinics and book via VoxCare when available.</p>
      <label class="search-wrap" for="searchInput">
        <input
          id="searchInput"
          type="search"
          placeholder="Search by clinic or city..."
          autocomplete="off"
        />
      </label>
      <p id="status" class="status" aria-live="polite">Locating you...</p>
    </header>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="script.js" defer></script>
  </body>
</html>
